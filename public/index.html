<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lockhern Time</title>
<style>
  :root {
    --ink:#1a1f24; --muted:#6b7580; --line:#e4e7eb; --bg:#f7f8fa;
    --accent:#2f6f4f; --accent-soft:#e8f2ec; --warn:#b06000; --field:#fffdf5;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased;}
  .wrap{max-width:680px;margin:0 auto;padding:20px 16px 120px;}
  header.top{display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin-bottom:4px;}
  h1{font-size:20px;margin:0;letter-spacing:-0.01em;}
  .sub{color:var(--muted);font-size:13px;}
  .card{background:#fff;border:1px solid var(--line);border-radius:12px;margin-top:16px;overflow:hidden;}
  .weekbar{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--line);flex-wrap:wrap;}
  .weekbar label{font-size:13px;color:var(--muted);font-weight:600;}
  select{font:inherit;padding:8px 10px;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--ink);}
  .row{display:flex;align-items:center;gap:12px;padding:11px 16px;border-bottom:1px solid var(--line);}
  .row:last-child{border-bottom:none;}
  .row.internal{background:#fafafa;}
  .cname{flex:1;font-size:15px;}
  .row.internal .cname{font-style:italic;color:var(--muted);}
  .hinput{width:84px;text-align:right;font:inherit;font-variant-numeric:tabular-nums;
    padding:9px 10px;border:1px solid var(--line);border-radius:8px;background:var(--field);}
  .hinput:focus{outline:2px solid var(--accent);outline-offset:-1px;border-color:var(--accent);background:#fff;}
  .unit{width:26px;font-size:12px;color:var(--muted);}
  .totals{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;background:var(--accent-soft);}
  .totals .big{font-size:22px;font-weight:700;font-variant-numeric:tabular-nums;}
  .totals .cap{font-size:13px;color:var(--muted);}
  .bar{height:8px;border-radius:99px;background:#e4e7eb;overflow:hidden;margin-top:6px;}
  .bar>i{display:block;height:100%;background:var(--accent);}
  .bar>i.over{background:#c5221f;}
  .savebar{position:fixed;left:0;right:0;bottom:0;background:#fff;border-top:1px solid var(--line);padding:12px 16px;}
  .savebar .inner{max-width:680px;margin:0 auto;width:100%;display:flex;gap:12px;align-items:center;justify-content:space-between;}
  button.save{font:inherit;font-weight:600;color:#fff;background:var(--accent);border:none;padding:12px 22px;border-radius:10px;cursor:pointer;}
  button.save:disabled{opacity:.5;cursor:default;}
  .status{font-size:13px;color:var(--muted);}
  .status.ok{color:var(--accent);}
  .msg{padding:40px 16px;text-align:center;color:var(--muted);}
  .skeleton{padding:16px;}
  .skeleton .sk{height:44px;background:#eef0f3;border-radius:8px;margin-bottom:8px;animation:p 1.2s infinite;}
  @keyframes p{50%{opacity:.5;}}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div><h1 id="hello">Timesheet</h1><div class="sub" id="sub">Loading…</div></div>
  </header>
  <div class="card" id="card">
    <div class="skeleton"><div class="sk"></div><div class="sk"></div><div class="sk"></div><div class="sk"></div></div>
  </div>
</div>
<div class="savebar" id="savebar" style="display:none">
  <div class="inner">
    <span class="status" id="status">Changes save when you press Save.</span>
    <button class="save" id="saveBtn">Save week</button>
  </div>
</div>

<script>
  var SLUG = getParam('user');
  var STATE = { week:null, user:null, clients:[], hours:{}, submitted:false };

  function getParam(k){ var m=new RegExp('[?&]'+k+'=([^&]+)').exec(location.search); return m?decodeURIComponent(m[1]):''; }

  function api(action, params){
    var qs = new URLSearchParams(Object.assign({action:action}, params||{})).toString();
    return fetch('/api/proxy?'+qs).then(function(r){return r.json();});
  }

  function load(week){
    setStatus('Loading…','');
    api('empLoad', {slug:SLUG, week:week||''}).then(render).catch(function(e){ fail({message:String(e)}); });
  }

  function fail(err){
    var d = err&&err.message?err.message:'no details';
    document.getElementById('card').innerHTML =
      '<div class="msg">Couldn\u2019t load your timesheet.<br><br><span style="font-size:12px;color:#c5221f">'+esc(d)+'</span></div>';
  }

  function render(res){
    if(!res||!res.ok){
      document.getElementById('hello').textContent='Timesheet not found';
      document.getElementById('sub').textContent='This link isn\u2019t recognized. Ask Aric for your correct link.';
      document.getElementById('card').innerHTML='<div class="msg">No timesheet is associated with this link.</div>';
      return;
    }
    STATE.week=res.week; STATE.user=res.user; STATE.clients=res.clients; STATE.hours=res.hours||{}; STATE.submitted=!!res.submitted;
    document.getElementById('hello').textContent='Hi, '+res.user.name;
    document.getElementById('sub').textContent=(res.clients.length-2)+' clients \u00b7 '+res.user.weeklyHours+' hrs/wk capacity';

    var weekOpts=res.weeks.map(function(w){return '<option value="'+w+'"'+(w===res.week?' selected':'')+'>'+fmtWeek(w)+'</option>';}).join('');
    var rows=res.clients.map(function(c){
      var v=STATE.hours[c.id]!=null?STATE.hours[c.id]:'';
      var isInt=c.id==='internal';
      return '<div class="row'+(isInt?' internal':'')+'"><span class="cname">'+esc(c.name)+'</span>'+
        '<input class="hinput" type="number" min="0" step="0.5" inputmode="decimal" data-id="'+c.id+'" value="'+v+'" placeholder="0">'+
        '<span class="unit">hrs</span></div>';
    }).join('');

    document.getElementById('card').innerHTML =
      '<div class="weekbar"><label>Week ending</label><select id="weekSel">'+weekOpts+'</select>'+
        '<span class="sub" id="submitState"></span></div>'+rows+
      '<div class="totals"><div style="width:100%">'+
        '<div style="display:flex;justify-content:space-between;align-items:baseline">'+
          '<div class="cap">Client hours <span id="clientNum" style="font-weight:700;color:var(--ink)">0.0</span></div>'+
          '<div class="cap">Total logged</div></div>'+
        '<div style="display:flex;justify-content:space-between;align-items:baseline">'+
          '<div class="cap" id="internalNote"></div>'+
          '<div class="big" id="totalNum">0.0</div></div>'+
        '<div class="bar"><i id="capBar" style="width:0%"></i></div>'+
        '<div class="cap" id="capText"></div></div></div>';

    setSubmitBadge();
    document.getElementById('savebar').style.display='flex';
    document.getElementById('weekSel').addEventListener('change',function(){ load(this.value); });
    Array.prototype.forEach.call(document.querySelectorAll('.hinput'),function(i){ i.addEventListener('input',recalc); });
    recalc();
    setStatus('Loaded. Changes save when you press Save.','');
  }

  function setSubmitBadge(){
    var s=document.getElementById('submitState'); if(!s)return;
    if(STATE.submitted){ s.textContent='\u2713 submitted'; s.style.color='var(--accent)'; s.style.fontWeight='600'; }
    else { s.textContent='not yet submitted'; s.style.color='#b06000'; }
  }

  function recalc(){
    var client=0, internal=0;
    Array.prototype.forEach.call(document.querySelectorAll('.hinput'),function(i){
      var id=i.getAttribute('data-id'); var v=parseFloat(i.value)||0;
      if(id==='internal') internal+=v; else client+=v;   // ad hoc counts as client work
    });
    var total=client+internal;
    document.getElementById('clientNum').textContent=client.toFixed(1);
    document.getElementById('totalNum').textContent=total.toFixed(1);
    document.getElementById('internalNote').textContent = internal>0 ? ('+ '+internal.toFixed(1)+' internal') : '';
    var cap=Number(STATE.user.weeklyHours)||0; var pct=cap>0?Math.round(total/cap*100):0;
    var bar=document.getElementById('capBar'); bar.style.width=Math.min(100,pct)+'%'; bar.className=pct>100?'over':'';
    document.getElementById('capText').textContent=cap>0?pct+'% of your '+cap+'-hr weekly capacity (total)':'';
  }

  function save(){
    var map={};
    Array.prototype.forEach.call(document.querySelectorAll('.hinput'),function(i){ map[i.getAttribute('data-id')]=parseFloat(i.value)||0; });
    var week=document.getElementById('weekSel').value;
    var btn=document.getElementById('saveBtn'); btn.disabled=true; setStatus('Saving…','');
    fetch('/api/proxy',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({action:'empSave',slug:SLUG,week:week,hours:map})})
      .then(function(r){return r.json();})
      .then(function(r){
        btn.disabled=false;
        if(r&&r.ok){ setStatus('Saved \u2713  '+r.savedAt,'ok'); STATE.submitted=true; setSubmitBadge(); }
        else setStatus('Save failed'+(r&&r.detail?': '+r.detail:'. Try again.'),'');
      })
      .catch(function(e){ btn.disabled=false; setStatus('Save failed: '+e,''); });
  }

  function setStatus(t,cls){ var s=document.getElementById('status'); s.textContent=t; s.className='status '+(cls||''); }
  function fmtWeek(w){ var d=new Date(w+'T12:00:00'); return 'Week ending '+d.toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'}); }
  function esc(s){ return String(s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }

  document.getElementById('saveBtn').addEventListener('click',save);
  if(!SLUG){ render({ok:false}); } else { load(''); }
</script>
</body>
</html>
