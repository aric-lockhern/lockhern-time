<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lockhern — Account Pacing</title>
<style>
:root{--bg:#F4F6F8;--surface:#FFFFFF;--ink:#17232E;--muted:#64717F;--faint:#93A0AD;--line:#E7EBEF;--line2:#EEF1F4;
--accent:#3A4FBF;--accent-bg:#EDEFFB;--good:#1B8A5A;--good-bg:#E7F4EE;--under:#B4791C;--under-bg:#FBF1DC;
--over:#C13B2E;--over-bg:#FBE9E6;--none:#AEB7C2;--editbg:#FFFDF3;--editline:#E4D9A8;}
*{box-sizing:border-box;}
body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased;}
.wrap{max-width:1180px;margin:0 auto;padding:22px 18px 40px;}
.t-good{color:var(--good);}.t-under{color:var(--under);}.t-over{color:var(--over);}.t-none{color:var(--none);}
.spin{animation:sp 1s linear infinite;}@keyframes sp{to{transform:rotate(360deg);}}

.topbar{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:16px;}
.brand{display:flex;align-items:center;gap:9px;}
.mark{font-weight:700;font-size:18px;letter-spacing:-.02em;}.sep{color:var(--faint);}
.prod{font-size:18px;font-weight:500;color:var(--muted);letter-spacing:-.01em;}
.datachip{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;border-radius:20px;padding:3px 10px;border:none;cursor:pointer;}
.datachip.live{color:var(--good);background:var(--good-bg);}
.datachip.sample{color:var(--under);background:var(--under-bg);}
.datachip.loading{color:var(--muted);background:var(--line2);cursor:default;}

.monthnav{display:flex;align-items:center;gap:6px;}
.mn-arrow{display:flex;align-items:center;justify-content:center;width:30px;height:30px;border:1px solid var(--line);background:var(--surface);border-radius:8px;color:var(--muted);cursor:pointer;font-size:16px;line-height:1;}
.mn-arrow:hover{border-color:#CDD5DE;color:var(--ink);}
.mn-label{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:650;min-width:158px;justify-content:center;}
.mn-tag{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;border-radius:5px;padding:2px 6px;}
.mn-tag.live{color:var(--good);background:var(--good-bg);}.mn-tag.plan{color:var(--accent);background:var(--accent-bg);}
.mn-today{border:none;background:var(--accent-bg);color:var(--accent);border-radius:7px;padding:6px 10px;font-size:12px;font-weight:600;cursor:pointer;}

.banner{display:flex;align-items:center;gap:9px;border-radius:10px;padding:10px 14px;font-size:12.5px;margin-bottom:14px;line-height:1.4;}
.banner.warn{background:var(--under-bg);border:1px solid #EAD9A8;color:#7A5A12;}
.banner.plan{background:var(--accent-bg);border:1px solid #D9DEF6;color:#2A3670;}
.banner button{border:1px solid #d9cf9e;background:#fff;border-radius:7px;padding:5px 11px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;margin-left:auto;}
.banner.plan button{border-color:#C7CEF0;color:var(--accent);}

.summary{display:grid;grid-template-columns:repeat(3,minmax(0,1fr)) minmax(0,1.6fr);gap:12px;margin-bottom:16px;}
.stat{background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:13px 15px;}
.stat-label{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--faint);font-weight:600;margin-bottom:6px;}
.stat-value{font-size:22px;font-weight:650;letter-spacing:-.02em;font-variant-numeric:tabular-nums;}
.stat-pace{display:flex;flex-direction:column;}
.pace-row{display:flex;align-items:baseline;gap:10px;margin-bottom:9px;}
.pace-num{font-size:22px;font-weight:700;font-variant-numeric:tabular-nums;}
.pace-var{font-size:12px;font-weight:600;font-variant-numeric:tabular-nums;}
.pace-plan{display:flex;align-items:center;gap:7px;color:var(--accent);font-size:13px;font-weight:600;padding-top:6px;}

.toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;position:relative;gap:12px;flex-wrap:wrap;}
.tcount{font-size:14px;font-weight:600;color:var(--muted);display:flex;align-items:center;gap:10px;}
.badge{display:inline-block;background:var(--surface);border:1px solid var(--line);border-radius:20px;padding:1px 9px;font-size:12px;font-variant-numeric:tabular-nums;}
.filtertag{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;color:var(--accent);background:var(--accent-bg);border-radius:20px;padding:2px 9px;}
.tactions{display:flex;align-items:center;gap:9px;}
.dayctl{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--muted);}
.dayin{width:38px;text-align:center;border:1px solid var(--line);border-radius:7px;padding:3px;font-size:12px;font-weight:600;font-variant-numeric:tabular-nums;background:var(--surface);}
.daypct{color:var(--faint);}
.saveind{font-size:12px;color:var(--faint);display:inline-flex;align-items:center;gap:4px;min-width:70px;justify-content:flex-end;}
.saveind.saved{color:var(--good);}
.btn{display:inline-flex;align-items:center;gap:6px;border-radius:9px;font-size:13px;font-weight:600;padding:7px 12px;cursor:pointer;border:1px solid var(--line);background:var(--surface);color:var(--ink);}
.btn:hover{border-color:#CDD5DE;}
.btn.primary{background:var(--accent);color:#fff;border-color:transparent;}

.tablewrap{background:var(--surface);border:1px solid var(--line);border-radius:12px;overflow:hidden;}
.tscroll{overflow-x:auto;}
.grid{display:grid;grid-template-columns:30px 1.7fr .9fr .9fr 1.1fr 1.4fr 1fr .7fr .8fr .7fr 34px;align-items:center;gap:10px;padding:0 16px;min-width:890px;}
.c-sel{display:flex;align-items:center;justify-content:center;}
.c-sel input{width:15px;height:15px;cursor:pointer;accent-color:var(--accent);}
.selbar{display:flex;align-items:center;gap:10px;background:var(--accent-bg);border:1px solid #D9DEF6;border-radius:10px;padding:9px 14px;margin-bottom:10px;}
.selcount{font-size:13px;font-weight:600;color:#2A3670;margin-right:2px;}
.btn.sm{padding:5px 10px;font-size:12px;}
.tag.linked{color:var(--accent);background:var(--accent-bg);}
.tag.hiddentag{color:var(--faint);background:var(--line2);}
.alertdot{color:var(--under);margin-right:5px;font-size:13px;cursor:help;}
.filtertag.on{background:var(--accent);color:#fff;}
.filtertag.issues{color:var(--under);background:var(--under-bg);}
.filtertag.issues.on{background:var(--under);color:#fff;}
.ed-actions{display:flex;align-items:center;gap:8px;}
.mini{border:1px solid var(--line);background:#fff;border-radius:7px;padding:4px 10px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;}
.mini:hover{border-color:#CDD5DE;color:var(--ink);}
.alertstrip{display:flex;align-items:center;gap:10px;flex-wrap:wrap;background:var(--under-bg);border:1px solid #EAD9A8;border-radius:9px;padding:9px 13px;margin-bottom:12px;}
.alertstrip.dismissed{background:var(--line2);border-color:var(--line);}
.as-warn{font-size:12px;font-weight:700;color:var(--under);}
.as-txt{font-size:12.5px;color:#7A5A12;}
.alertstrip.dismissed .as-txt{color:var(--muted);}
.as-actions{margin-left:auto;display:flex;gap:8px;}
.setrow select{border:1px solid var(--line);border-radius:8px;padding:9px 11px;font-size:14px;font-family:inherit;color:var(--ink);background:#fff;}
.setnote code{background:var(--line2);padding:1px 5px;border-radius:4px;font-size:11px;}
.topright{display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.tabs{display:inline-flex;background:#EEF1F4;border-radius:9px;padding:3px;gap:2px;}
.tab{border:none;background:none;padding:6px 14px;border-radius:7px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;}
.tab.on{background:#fff;color:var(--ink);box-shadow:0 1px 3px rgba(20,30,45,.1);}
.filtertag{border:none;cursor:pointer;}
.filtertag:hover{filter:brightness(.97);}
.settings{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:22px 22px 20px;max-width:620px;}
.settings h3{margin:0 0 16px;font-size:16px;}
.setrow{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
.setrow label{font-size:12px;font-weight:600;color:var(--muted);}
.setrow input{border:1px solid var(--line);border-radius:8px;padding:9px 11px;font-size:14px;font-family:inherit;color:var(--ink);}
.setrow input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-bg);}
.setactions{display:flex;align-items:center;gap:12px;margin-top:4px;}
.setstate{font-size:12px;font-weight:600;color:var(--faint);}
.setstate.ok{color:var(--good);}
.setnote{font-size:12px;color:var(--faint);line-height:1.5;margin:16px 0 0;}
.head{height:38px;background:#FAFBFC;border-bottom:1px solid var(--line);font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--faint);font-weight:600;}
.c-num{text-align:right;font-variant-numeric:tabular-nums;}
.c-budget{text-align:right;}
.head .c-budget{display:flex;justify-content:flex-end;align-items:center;gap:6px;}
.edithint{font-size:9px;font-weight:700;color:var(--under);background:var(--under-bg);border-radius:4px;padding:1px 4px;}
.c-chev{display:flex;justify-content:center;}
.head .sortable{cursor:pointer;user-select:none;}
.head .sortable:hover{color:var(--muted);}
.head .sort-active{color:var(--ink);}
.carried{font-size:12px;color:var(--accent);margin-right:4px;cursor:help;}
.budgetfield.inherited{border-style:dashed;border-color:var(--accent);}
.detail{margin-top:16px;}
.rangebar{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
.rangebar .rl{font-size:12px;font-weight:600;color:var(--muted);}
.segment.sm{padding:2px;}
.segment.sm button{padding:5px 12px;font-size:12px;}
.rangecount{font-size:12px;color:var(--faint);font-variant-numeric:tabular-nums;}
.charts{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.chartcard{background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:12px 12px 8px;}
.ch-title{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px;}
.legend{display:flex;gap:14px;justify-content:center;margin-top:4px;}
.lg{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);}
.lg i{width:14px;height:3px;border-radius:2px;display:inline-block;}
.chnote{text-align:center;font-size:11px;color:var(--faint);margin-top:5px;font-variant-numeric:tabular-nums;}
.bd-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:10px;}
table.bd{width:100%;border-collapse:collapse;font-size:12.5px;min-width:640px;}
table.bd th{text-align:left;padding:8px 12px;background:#FAFBFC;color:var(--faint);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--line);}
table.bd th.r,table.bd td.r{text-align:right;}
table.bd td{padding:7px 12px;border-bottom:1px solid var(--line2);font-variant-numeric:tabular-nums;}
table.bd tr:last-child td{border-bottom:none;}
@media(max-width:680px){.charts{grid-template-columns:1fr;}}
.rowblock{border-bottom:1px solid var(--line2);}.rowblock:last-child{border-bottom:none;}
.row{height:54px;cursor:pointer;font-size:14px;}
.row:hover{background:#FAFBFC;}
.acc-name{font-weight:600;letter-spacing:-.01em;}
.acc-plats{margin-left:7px;display:inline-flex;gap:3px;}
.tag{font-size:10px;font-weight:700;color:var(--muted);background:var(--line2);border-radius:4px;padding:1px 4px;}
.c-num.strong{font-weight:650;}.c-num.neg{color:var(--over);}.c-num.pos{color:var(--good);}
.pacepct{font-size:12px;font-weight:700;font-variant-numeric:tabular-nums;display:inline-block;margin-bottom:4px;}
.trendbadge{font-size:9px;font-weight:700;border-radius:4px;padding:1px 5px;margin-left:6px;vertical-align:top;}
.trendbadge.good{color:var(--good);background:var(--good-bg);}
.trendbadge.up{color:var(--accent);background:var(--accent-bg);}
.recentstrip{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-bottom:12px;}
@media(max-width:680px){.recentstrip{grid-template-columns:1fr 1fr;}}
.rp{display:flex;flex-direction:column;gap:2px;}
.rp-l{font-size:11px;color:var(--faint);font-weight:600;}
.rp-v{font-size:16px;font-weight:650;font-variant-numeric:tabular-nums;}
.rp-v.t-none{color:var(--ink);}
.rp-r{font-size:11px;color:var(--faint);font-variant-numeric:tabular-nums;}
.pace-na{color:var(--faint);}
.chev{color:var(--faint);transition:transform .18s;display:inline-block;}
.rowblock.open .chev{transform:rotate(180deg);}

.budgetfield{display:inline-flex;align-items:center;justify-content:flex-end;background:var(--editbg);border:1px solid var(--editline);border-radius:8px;padding:0 4px 0 8px;max-width:118px;margin-left:auto;}
.budgetfield:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-bg);background:#fff;}
.bf-pre{color:var(--faint);font-size:13px;}
.bf-in{border:none;outline:none;background:transparent;text-align:right;width:78px;padding:6px 3px;font-size:14px;font-weight:600;font-variant-numeric:tabular-nums;color:var(--ink);}
.lmbudget{display:inline-flex;align-items:center;gap:5px;margin-left:auto;background:none;border:1px dashed var(--line);border-radius:8px;padding:6px 9px;font-size:14px;font-weight:600;font-variant-numeric:tabular-nums;color:var(--ink);cursor:pointer;}
.lmbudget:hover{border-color:var(--accent);}
.lm{font-size:9px;font-weight:700;color:var(--accent);background:var(--accent-bg);border-radius:4px;padding:1px 4px;}
.total-budget{font-weight:650;font-variant-numeric:tabular-nums;padding-right:5px;}

.meter{position:relative;width:100%;max-width:170px;height:8px;}
.meter-track{position:absolute;inset:0;background:#EDF0F3;border-radius:20px;}
.meter-fill{position:absolute;top:0;bottom:0;left:0;border-radius:20px;transition:width .3s ease;}
.meter-fill.s-good{background:var(--good);}.meter-fill.s-under{background:var(--under);}.meter-fill.s-over{background:var(--over);}.meter-fill.s-none{background:var(--none);}
.meter-marker{position:absolute;top:-2px;bottom:-2px;width:2px;background:var(--ink);opacity:.55;border-radius:2px;left:66.6%;}

.editor{padding:2px 16px 18px;background:#FAFBFC;border-top:1px dashed var(--line);}
.ed-top{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:14px 0 10px;flex-wrap:wrap;}
.ed-labels{display:flex;gap:6px;flex-wrap:wrap;}
.lbl{font-size:11px;font-weight:600;color:var(--muted);background:var(--line2);border-radius:6px;padding:3px 8px;}
.lbl.on{color:var(--good);background:var(--good-bg);}
.lbl-none{font-size:12px;color:var(--faint);}
.upd{font-size:11px;color:var(--faint);font-variant-numeric:tabular-nums;}
.synced-note{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--faint);margin-bottom:12px;}
.platforms{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.readout{background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:12px 13px;}
.readout.off{opacity:.55;}
.ro-head{display:flex;align-items:center;justify-content:space-between;gap:8px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:11px;}
.ro-id{font-size:10px;font-weight:500;color:var(--faint);text-transform:none;letter-spacing:0;}
.ro-off{font-size:10px;font-weight:600;color:var(--faint);text-transform:none;letter-spacing:0;}
.ro-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px 10px;}
.src{display:flex;flex-direction:column;gap:2px;}
.src-label{font-size:11px;color:var(--faint);font-weight:600;}
.src-value{font-size:15px;font-weight:600;font-variant-numeric:tabular-nums;}
.budgetbox{margin-top:14px;background:var(--editbg);border:1px solid var(--editline);border-radius:10px;padding:13px 14px;}
.bb-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--under);margin-bottom:11px;}
.bb-controls{display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
.segment{display:inline-flex;background:#fff;border:1px solid var(--line);border-radius:9px;padding:3px;gap:2px;}
.segment button{border:none;background:none;padding:6px 13px;border-radius:7px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;}
.segment button.on{background:var(--accent);color:#fff;}
.bb-readout{font-size:14px;font-weight:600;font-variant-numeric:tabular-nums;color:var(--ink);}
.bb-readout small{display:block;font-size:11px;font-weight:500;color:var(--faint);margin-top:1px;}

.totalrow{height:50px;background:#F7F9FB;border-top:1px solid var(--line);font-size:14px;font-weight:650;}
.empty{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:44px 20px;text-align:center;color:var(--muted);}
.empty-head{font-size:16px;font-weight:650;color:var(--ink);margin:0 0 6px;}
.empty-sub{font-size:13px;margin:0 auto 16px;max-width:460px;line-height:1.5;}
.foot{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-top:13px;font-size:12px;color:var(--faint);}
.foot b{font-weight:700;}.foot-dot{color:var(--line);}
@media (max-width:820px){.summary{grid-template-columns:1fr 1fr;}.stat-pace{grid-column:1 / -1;}}
@media (prefers-reduced-motion:reduce){*{transition:none !important;}.spin{animation:none;}}
button:focus-visible,input:focus-visible{outline:2px solid var(--accent);outline-offset:1px;}
</style>
</head>
<body>
<div class="wrap" id="app"></div>

<script>
/* ============================================================
   CONFIG — set these two, then host the file (see chat).
   ============================================================ */
function lsGet(k,d){ try{ var v=localStorage.getItem(k); return (v==null||v==='')?d:v; }catch(e){ return d; } }
function lsSet(k,v){ try{ localStorage.setItem(k,v); }catch(e){} }
function sortFromPref(){ var p=lsGet('lk_sort','name'); return p==='spend'?{key:'mtd',dir:'desc'}:(p==='issue'?{key:'issue',dir:'desc'}:{key:'name',dir:'asc'}); }
var DEFAULT_WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbw3NZFjb0A3jN1OS3Kwu_1obkyy-8KU6lCAUXjawqFG66guzY3GU0hbC5A6RH3oQNLD/exec';
var DEFAULT_SECRET     = 'lockhern-pacing';                        // must match the gateway
var WEBAPP_URL = lsGet('lk_webapp', DEFAULT_WEBAPP_URL);
var SECRET     = lsGet('lk_secret', DEFAULT_SECRET);
var ACTIVE_LABEL = 'active';

/* ---- state ---- */
var state = {
  accounts: [], budgets: {}, open: {}, dailyByClient: {},
  rawG: [], rawM: [], rawDailyG: [], rawDailyM: [], groups: {}, hidden: {}, dismiss: {}, selected: {},
  view: 'pacing', showAll: false, showHidden: false, filterIssues: false, detailDays: 30,
  viewMonth: monthKey(new Date()),
  liveKey: monthKey(new Date()),
  elapsedOverride: loadElapsed(),
  source: 'loading', feedUpdated: '', save: 'idle',
  sort: sortFromPref()
};
var saveTimers = {};

/* ---- JSONP (works cross-origin, keeps the sheet private) ---- */
function jsonp(params){
  return new Promise(function(resolve, reject){
    var cb = 'cb_' + Math.random().toString(36).slice(2);
    var script = document.createElement('script');
    var timer = setTimeout(function(){ cleanup(); reject(new Error('timeout')); }, 20000);
    function cleanup(){ clearTimeout(timer); try{ delete window[cb]; }catch(e){ window[cb]=undefined; } if(script.parentNode) script.parentNode.removeChild(script); }
    window[cb] = function(data){ cleanup(); resolve(data); };
    var q = Object.assign({}, params, { callback: cb, secret: SECRET });
    var qs = Object.keys(q).map(function(k){ return encodeURIComponent(k)+'='+encodeURIComponent(q[k]); }).join('&');
    script.src = WEBAPP_URL + '?' + qs;
    script.onerror = function(){ cleanup(); reject(new Error('network')); };
    document.body.appendChild(script);
  });
}

/* ---- load ---- */
function loadData(){
  if(WEBAPP_URL.indexOf('http')!==0){ state.source='sample'; state.accounts=SAMPLE; render(); return; }
  state.source='loading'; render();
  jsonp({ action:'data' }).then(function(res){
    if(!res || !res.ok) throw new Error(res && res.error || 'bad response');
    var feeds = res.feeds || {}, dl = res.dailies || {};
    state.rawG = feeds.Google_Feed||[]; state.rawM = feeds.Microsoft_Feed||[];
    state.rawDailyG = dl.Daily_Google||[]; state.rawDailyM = dl.Daily_Microsoft||[];
    state.groups = groupsToMap(res.groups||[]);
    state.dismiss = dismissToMap(res.dismissals||[]);
    state.budgets = budgetsToMap(res.budgets||[]);
    rebuild();
    var stamps = state.accounts.map(function(a){return a.updated;}).filter(Boolean).sort();
    state.feedUpdated = stamps.length ? stamps[stamps.length-1] : '';
    state.source='live'; render();
  }).catch(function(){
    state.accounts = SAMPLE; state.rawG=[]; state.rawM=[]; state.groups={}; state.dailyByClient={};
    state.source='sample'; render();
  });
}

/* ---- transforms ---- */
function toNum(v){ var n=Number(String(v==null?'':v).replace(/[^0-9.\-]/g,'')); return isFinite(n)?n:0; }
function splitLabels(s){ return String(s||'').split(/[|,;]/).map(function(x){return x.trim();}).filter(Boolean); }

function effClient(row){ var id=String(row.AccountId||'').trim(); return (state.groups[id] || row.Client || row.Account || '').trim(); }
function idsFor(members,plat){ return members.filter(function(m){return m.platform===plat;}).map(function(m){return m.name;}).join(', '); }
function groupsToMap(rows){
  state.hidden={};
  var out={};
  (rows||[]).forEach(function(r){
    var id=String(r.AccountId||'').trim(); if(!id) return;
    var g=String(r.Group||'').trim(); if(g) out[id]=g;
    if(String(r.Hidden||'').trim()==='1') state.hidden[id]=true;
  });
  return out;
}
function dismissToMap(rows){ var out={}; (rows||[]).forEach(function(r){ var c=String(r.Client||'').trim(), u=normDate(r.Until); if(c&&u) out[c]=u; }); return out; }
function rebuild(){ state.accounts=buildAccounts(state.rawG,state.rawM); state.dailyByClient=buildDaily(state.rawDailyG,state.rawDailyM); }
function accountByClient(cl){ for(var i=0;i<state.accounts.length;i++){ if(state.accounts[i].client===cl) return state.accounts[i]; } return null; }

function buildAccounts(g, m){
  var map = {};
  function ensure(c){ return map[c] || (map[c]={client:c,g:null,m:null,labelSet:{},updated:'',members:[],currency:''}); }
  function add(row, plat, platName){
    var client=effClient(row); if(!client) return;
    var id=String(row.AccountId||'').trim();
    var a=ensure(client);
    var b=a[plat]=a[plat]||{spend:0,conv:0,val:0,last:0};
    b.spend+=toNum(row.MTD_Spend); b.conv+=toNum(row.MTD_Conversions); b.val+=toNum(row.MTD_ConvValue); b.last+=toNum(row.LastMonth_Spend);
    a.members.push({accountId:id, platform:platName, name:row.Account||id});
    if(row.Currency) a.currency=row.Currency;
    splitLabels(row.Labels).forEach(function(l){ a.labelSet[l]=true; });
    if(row.Updated) a.updated=row.Updated;
  }
  g.forEach(function(r){ add(r,'g','Google'); }); m.forEach(function(r){ add(r,'m','Microsoft'); });
  return Object.keys(map).map(function(k){
    var a=map[k];
    return { client:a.client, hasG:!!a.g, hasM:!!a.m, labels:Object.keys(a.labelSet), currency:a.currency, updated:a.updated,
      members:a.members, grouped:a.members.length>1,
      hidden:a.members.some(function(mm){return !!state.hidden[mm.accountId];}),
      ids:{ g:idsFor(a.members,'Google'), m:idsFor(a.members,'Microsoft') },
      g:a.g||{spend:0,conv:0,val:0,last:0}, m:a.m||{spend:0,conv:0,val:0,last:0} };
  }).sort(function(x,y){ return x.client.localeCompare(y.client); });
}
function budgetsToMap(rows){
  var out={};
  rows.forEach(function(r){
    var month=normMonth(r.Month), client=String(r.Client||'').trim();
    if(!month||!client) return;
    (out[month]=out[month]||{})[client]={ mode:(String(r.Mode||'manual')==='lastMonth'?'lastMonth':'manual'), amount:toNum(r.Amount) };
  });
  return out;
}
function normMonth(v){
  if(v==null) return '';
  var s=String(v).trim();
  var m=s.match(/^(\d{4})-(\d{1,2})/);
  if(m) return m[1]+'-'+('0'+m[2]).slice(-2);
  var d=new Date(s);
  if(!isNaN(d.getTime())) return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2);
  return s;
}
function isActive(a){ return a.labels.some(function(l){ return l.toLowerCase()===ACTIVE_LABEL; }); }

/* ---- budgets (with carry-forward from the most recent prior month) ---- */
function getBudget(client){
  var ex = state.budgets[state.viewMonth] && state.budgets[state.viewMonth][client];
  if(ex) return { mode:ex.mode, amount:ex.amount, inherited:false };
  var k=state.viewMonth;
  for(var i=0;i<12;i++){
    k=shiftKey(k,-1);
    var b=state.budgets[k] && state.budgets[k][client];
    if(b) return { mode:b.mode, amount:b.amount, inherited:true, from:k };
  }
  return { mode:'manual', amount:0, inherited:false };
}
function inheritedInfo(list){
  var info={any:false,from:''};
  if(state.viewMonth!==state.liveKey) return info;
  list.forEach(function(a){ var b=getBudget(a.client); if(b.inherited){ info.any=true; info.from=b.from; } });
  return info;
}
function carryOverAll(){
  visibleAccounts().list.forEach(function(a){
    var b=getBudget(a.client);
    if(b.inherited) setBudget(a.client,{mode:b.mode,amount:b.amount});
  });
  render();
}

/* ---- sorting ---- */
function toggleSort(key){
  var s=state.sort;
  if(s.key===key) s.dir = s.dir==='asc' ? 'desc' : 'asc';
  else { s.key=key; s.dir = key==='name' ? 'asc' : 'desc'; } // numbers default high→low
}
function sortVal(a,key){
  if(key==='name') return a.client;
  var d=derive(a);
  return { mtd:d.mtd, forecast:d.forecast, budget:d.effBudget, pace:d.pace,
           variance:d.variance, conv:d.conv, cpa:d.cpa, roas:d.roas }[key];
}
function sortAccounts(list){
  var s=state.sort; if(!s||!s.key) return list;
  if(s.key==='issue'){
    return list.slice().sort(function(a,b){
      var fa=alertFor(a).flagged?1:0, fb=alertFor(b).flagged?1:0;
      if(fa!==fb) return fb-fa;
      return derive(b).mtd - derive(a).mtd;
    });
  }
  return list.slice().sort(function(a,b){
    var va=sortVal(a,s.key), vb=sortVal(b,s.key);
    var na=(va==null||(typeof va==='number'&&!isFinite(va)));
    var nb=(vb==null||(typeof vb==='number'&&!isFinite(vb)));
    if(na&&nb) return a.client.localeCompare(b.client);
    if(na) return 1; if(nb) return -1;            // blanks always sink to the bottom
    var cmp = typeof va==='string' ? va.toLowerCase().localeCompare(vb.toLowerCase()) : va-vb;
    return s.dir==='asc' ? cmp : -cmp;
  });
}
function th(label,key,cls){
  var s=state.sort, active=s.key===key, arrow=active?(s.dir==='asc'?' ▲':' ▼'):'';
  return '<div class="'+cls+' sortable'+(active?' sort-active':'')+'" data-act="sort" data-key="'+key+'">'+label+arrow+'</div>';
}
function setBudget(client, patch){
  var month=state.viewMonth;
  var cur=getBudget(client);
  var next=Object.assign({},cur,patch);
  (state.budgets[month]=state.budgets[month]||{})[client]=next;
  scheduleSave(client, month, next);
}
function scheduleSave(client, month, b){
  state.save='saving'; updateSaveInd();
  clearTimeout(saveTimers[client+'|'+month]);
  saveTimers[client+'|'+month]=setTimeout(function(){
    if(WEBAPP_URL.indexOf('http')!==0){ state.save='idle'; updateSaveInd(); return; }
    jsonp({ action:'setBudget', client:client, month:month, mode:b.mode, amount:b.amount })
      .then(function(){ state.save='saved'; updateSaveInd(); setTimeout(function(){ state.save='idle'; updateSaveInd(); },1400); })
      .catch(function(){ state.save='idle'; updateSaveInd(); });
  }, 700);
}

/* ---- month / derive ---- */
function monthKey(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); }
function parseKey(k){ var p=k.split('-'); return {y:+p[0],m:+p[1]-1}; }
function monthLabel(k){ var o=parseKey(k); return new Date(o.y,o.m,1).toLocaleString('en-US',{month:'long',year:'numeric'}); }
function daysInMonthOf(k){ var o=parseKey(k); return new Date(o.y,o.m+1,0).getDate(); }
function shiftKey(k,d){ var o=parseKey(k); return monthKey(new Date(o.y,o.m+d,1)); }

function ctx(){
  var isLive = state.viewMonth===state.liveKey;
  var dim = daysInMonthOf(state.viewMonth);
  var auto = Math.max(1, new Date().getDate()-1);
  var elapsed = state.elapsedOverride!=null ? Math.max(1,Math.min(state.elapsedOverride,dim)) : auto;
  return { isLive:isLive, dim:dim, auto:auto, elapsed:elapsed };
}
function derive(acc){
  var c=ctx();
  var mtd=acc.g.spend+acc.m.spend, lastMoTotal=acc.g.last+acc.m.last, conv=acc.g.conv+acc.m.conv, val=acc.g.val+acc.m.val;
  var forecast = c.isLive && c.elapsed>0 ? (mtd/c.elapsed)*c.dim : null;
  var b=getBudget(acc.client);
  var effBudget = b.mode==='lastMonth' ? lastMoTotal : b.amount;
  var pace = effBudget>0 && forecast!=null ? forecast/effBudget : null;
  var variance = forecast!=null ? forecast-effBudget : null;
  var cpa = conv>0 ? mtd/conv : null;
  var roas = val>0 && mtd>0 ? val/mtd : null;
  return { mtd:mtd,lastMoTotal:lastMoTotal,conv:conv,val:val,forecast:forecast,effBudget:effBudget,pace:pace,variance:variance,cpa:cpa,roas:roas,budget:b };
}

/* ---- format ---- */
function money(n,c){ if(n==null||!isFinite(n))return '—'; var a=Math.abs(n); if(c&&a>=1000){ return a>=1e6?'$'+(n/1e6).toFixed(1)+'M':'$'+(n/1000).toFixed(1)+'k'; } return '$'+Math.round(n).toLocaleString(); }
function pct(x){ return x==null||!isFinite(x)?'—':Math.round(x*100)+'%'; }
function xfmt(x){ return x==null||!isFinite(x)?'—':x.toFixed(2)+'x'; }
function intf(x){ return x==null||!isFinite(x)?'—':Math.round(x).toLocaleString(); }
function fmtInt(n){ return Math.round(Number(n)||0).toLocaleString('en-US'); }
function statusOf(p){ if(p==null)return 'none'; if(p<0.9)return 'under'; if(p>1.1)return 'over'; return 'good'; }
function esc(s){ return String(s).replace(/[&<>"]/g,function(ch){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[ch];}); }

/* ---- persistence of personal setting ---- */
function loadElapsed(){ try{ var v=localStorage.getItem('lk_elapsed'); return v===null?null:parseInt(v,10); }catch(e){ return null; } }
function saveElapsed(v){ try{ if(v==null) localStorage.removeItem('lk_elapsed'); else localStorage.setItem('lk_elapsed',String(v)); }catch(e){} }

/* ============================================================
   RENDER
   ============================================================ */
function meterHTML(pace,status){
  var SCALE=1.5; var fill=pace==null?0:Math.min(pace,SCALE)/SCALE*100;
  return '<div class="meter"><div class="meter-track"></div><div class="meter-fill s-'+status+'" style="width:'+fill+'%"></div><div class="meter-marker"></div></div>';
}
function visibleAccounts(){
  var anyLabels=state.accounts.some(function(a){return a.labels.length;});
  var list=state.accounts.filter(function(a){
    if(a.hidden) return state.showHidden;            // hidden show only in "show hidden" mode
    if(anyLabels && !state.showAll && !isActive(a)) return false;
    return true;
  });
  if(state.filterIssues) list=list.filter(function(a){ return alertFor(a).flagged; });
  return { list:list, anyLabels:anyLabels };
}
function totals(list){
  var t={mtd:0,forecast:0,budget:0,conv:0,val:0}, isLive=state.viewMonth===state.liveKey;
  list.forEach(function(a){ var d=derive(a); t.mtd+=d.mtd; t.forecast+=d.forecast||0; t.budget+=d.effBudget||0; t.conv+=d.conv; t.val+=d.val; });
  t.pace = isLive&&t.budget>0 ? t.forecast/t.budget : null;
  t.variance = isLive ? t.forecast-t.budget : null;
  t.cpa = t.conv>0 ? t.mtd/t.conv : null;
  t.roas = t.val>0&&t.mtd>0 ? t.val/t.mtd : null;
  return t;
}

function stat(label,value){ return '<div class="stat"><div class="stat-label">'+label+'</div><div class="stat-value">'+value+'</div></div>'; }
function sourceChip(){

function updateSaveInd(){ var el=document.getElementById('saveind'); if(el){ el.className='saveind '+state.save; el.textContent=saveText(); } }

function rowHTML(a,isLive){

  var al=alertFor(a);
  var carried = b.inherited ? '<span class="carried" title="Carried over from '+esc(monthLabel(b.from))+' — edit to set for this month">↩</span>' : '';

/* ---- daily detail (charts + breakdown) ---- */
function normDate(v){
  if(v==null) return '';
  var s=String(v).trim();
  var m=s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(m) return m[1]+'-'+m[2]+'-'+m[3];
  var d=new Date(s);
  if(!isNaN(d.getTime())) return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2);
  return s;
}
function buildDaily(gRows,mRows){
  var map={};
  function add(row){
    var client=effClient(row), date=normDate(row.Date);
    if(!client||!date) return;
    var c=map[client]=map[client]||{};
    var d=c[date]=c[date]||{date:date,spend:0,conv:0,clicks:0,impr:0,rev:0};
    d.spend+=toNum(row.Spend); d.conv+=toNum(row.Leads); d.clicks+=toNum(row.Clicks); d.impr+=toNum(row.Impressions); d.rev+=toNum(row.Revenue);
  }
  (gRows||[]).forEach(add); (mRows||[]).forEach(add);
  var out={};
  Object.keys(map).forEach(function(cl){ out[cl]=Object.keys(map[cl]).map(function(k){return map[cl][k];}).sort(function(a,b){return a.date<b.date?-1:(a.date>b.date?1:0);}); });
  return out;
}
/* ---- account grouping (multi-select → group / ungroup) ---- */
function persistGroup(id, platform, name, group){
  if(state.source!=='live') return;
  state.save='saving'; updateSaveInd();
  jsonp({action:'setGroup',accountId:id,platform:platform,account:name,group:group})
    .then(function(){ state.save='saved'; updateSaveInd(); setTimeout(function(){state.save='idle';updateSaveInd();},1200); })
    .catch(function(){ state.save='idle'; updateSaveInd(); });
}
function groupSelected(){
  if(state.source!=='live'){ alert('Grouping saves to the sheet — connect the app to your gateway first.'); return; }
  var sel=Object.keys(state.selected).filter(function(c){return state.selected[c];});
  if(sel.length<2){ alert('Select at least two accounts to group.'); return; }
  var members=[]; sel.forEach(function(cl){ var a=accountByClient(cl); if(a) a.members.forEach(function(m){ members.push(m); }); });
  var name=prompt('Group these '+sel.length+' accounts into one client named:', sel.slice().sort()[0]);
  if(name==null) return; name=name.trim(); if(!name) return;
  members.forEach(function(m){ state.groups[m.accountId]=name; });
  state.selected={}; rebuild(); render();
  members.forEach(function(m){ persistGroup(m.accountId, m.platform, m.name, name); });
}
function bulkLastMonth(){
  var sel=Object.keys(state.selected).filter(function(c){return state.selected[c];});
  if(!sel.length) return;
  if(!confirm('Set '+sel.length+' account'+(sel.length>1?'s':'')+' to use last month\u2019s spend as the '+monthLabel(state.viewMonth)+' budget?')) return;

}
function ungroupSelected(){
  var sel=Object.keys(state.selected).filter(function(c){return state.selected[c];});
  var clear=[];
  sel.forEach(function(cl){ var a=accountByClient(cl); if(a&&a.grouped) a.members.forEach(function(m){ if(state.groups[m.accountId]) clear.push(m); }); });
  if(!clear.length){ alert('None of the selected accounts are grouped.'); return; }
  clear.forEach(function(m){ delete state.groups[m.accountId]; });
  state.selected={}; rebuild(); render();
  clear.forEach(function(m){ persistGroup(m.accountId, m.platform, m.name, ''); });
}

/* ---- alerts (WoW drop on spend / conversions / revenue, through yesterday) ---- */
var ALERT_DROP=0.35;
function todayIso(){ var d=new Date(); return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2); }
/* ---- recent trend: has spend been corrected in the last few days? ---- */
function recentPace(a, d){
  var out={ok:false};
  var target = d.effBudget>0 ? d.effBudget/daysInMonthOf(state.viewMonth) : 0;
  if(!target) return out;
  var daily=accountDaily(a.client).filter(function(p){ return String(p.date)<todayIso(); });
  if(!daily.length) return out;
  function avg(k){ var s=daily.slice(-k); if(!s.length) return null; var t=0; s.forEach(function(r){t+=r.spend;}); return t/s.length; }
  out.ok=true; out.target=target;
  out.yesterday=daily[daily.length-1].spend;
  out.yDate=daily[daily.length-1].date;
  out.avg3=avg(3); out.avg7=avg(7);
  out.days=daily.length;
  out.ratio3=out.avg3!=null?out.avg3/target:null;
  out.ratioY=out.yesterday/target;
  return out;
}
function trendBadge(a, d){
  var r=recentPace(a,d);
  if(!r.ok || r.ratio3==null || r.days<3 || d.pace==null) return '';
  var title='Last 3 days avg '+money(r.avg3)+'/day vs '+money(r.target)+' target';
  if(d.pace>1.1 && r.ratio3<=1.05) return '<span class="trendbadge good" title="'+esc(title)+'">↓ corrected</span>';
  if(d.pace<0.9 && r.ratio3>=0.95) return '<span class="trendbadge up" title="'+esc(title)+'">↑ ramped</span>';
  return '';
}
function recentStripHTML(a,d){
  var r=recentPace(a,d);
  if(!r.ok) return '';
  function cellv(label,val,ratio){
    var cls = ratio==null ? '' : (ratio>1.15?'over':(ratio<0.85?'under':'good'));
    return '<div class="rp"><span class="rp-l">'+label+'</span><span class="rp-v t-'+(cls||'none')+'">'+money(val)+'</span>'
      + (ratio!=null?('<span class="rp-r">'+Math.round(ratio*100)+'% of target</span>'):'')+'</div>';
  }
  return '<div class="recentstrip">'
    + '<div class="rp"><span class="rp-l">Target / day</span><span class="rp-v">'+money(r.target)+'</span><span class="rp-r">'+esc(monthLabel(state.viewMonth))+' budget ÷ days</span></div>'
    + cellv('Yesterday ('+labelDate(r.yDate)+')', r.yesterday, r.ratioY)
    + (r.avg3!=null?cellv('Last 3 days avg', r.avg3, r.ratio3):'')
    + (r.avg7!=null?cellv('Last 7 days avg', r.avg7, r.avg7/r.target):'')
    + '</div>';

function alertFor(a){
  var res={flagged:false,dismissed:false,reasons:[]};
  var u=state.dismiss[a.client]; if(u && u>=todayIso()) res.dismissed=true;
  var daily=accountDaily(a.client).filter(function(p){ return String(p.date)<todayIso(); });
  if(daily.length>=14){
    var last7=daily.slice(-7), prev7=daily.slice(-14,-7);
    function sum(arr,k){ var s=0; arr.forEach(function(r){ s+=r[k]||0; }); return s; }
    [['spend','Spend',100],['conv','Conversions',3],['rev','Revenue',100]].forEach(function(m){
      var p=sum(prev7,m[0]), r=sum(last7,m[0]);
      if(p>=m[2] && p>0){ var ch=(r-p)/p; if(ch<=-ALERT_DROP) res.reasons.push({label:m[1],pct:ch}); }
    });
  }
  res.flagged = res.reasons.length>0 && !res.dismissed;
  return res;
}
function dismissClient(a, days){

var MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function labelDate(iso){ var p=iso.split('-'); return MONTHS[(+p[1]-1)]+' '+(+p[2]); }
function niceMax(v){ if(v<=0)return 1; var p=Math.pow(10,Math.floor(Math.log(v)/Math.LN10)); var n=v/p; var m=n<=1?1:(n<=2?2:(n<=5?5:10)); return m*p; }
function makeXTicks(rows){ var n=rows.length,k=Math.min(5,n),t=[]; for(var i=0;i<k;i++){ var idx=Math.round(i*(n-1)/((k-1)||1)); t.push({x:rows[idx].dayNum,label:labelDate(rows[idx].date)}); } return t; }
function chartSVG(o){
  var w=480,h=190,padL=46,padR=12,padT=12,padB=26,iw=w-padL-padR,ih=h-padT-padB;
  var xMin=o.xMin,xMax=o.xMax,yMax=o.yMax||1;
  function X(x){ return padL+(xMax===xMin?0:(x-xMin)/(xMax-xMin))*iw; }
  function Y(y){ return padT+ih-(y/yMax)*ih; }
  var g='';
  for(var i=0;i<=4;i++){ var yv=yMax*i/4,py=Y(yv);
    g+='<line x1="'+padL+'" y1="'+py.toFixed(1)+'" x2="'+(w-padR)+'" y2="'+py.toFixed(1)+'" stroke="#EDF0F3"/>';
    g+='<text x="'+(padL-6)+'" y="'+(py+3).toFixed(1)+'" text-anchor="end" font-size="9" fill="#93A0AD">'+o.yFmt(yv)+'</text>'; }
  (o.xTicks||[]).forEach(function(t){ g+='<text x="'+X(t.x).toFixed(1)+'" y="'+(h-8)+'" text-anchor="middle" font-size="9" fill="#93A0AD">'+t.label+'</text>'; });
  if(o.bars && o.bars.pts.length){
    var n=o.bars.pts.length;
    var slot=(xMax===xMin)?iw:iw/(n>1?(n-1):1);
    var bw=Math.max(1.5,Math.min(14,slot*0.62));
    o.bars.pts.forEach(function(p){
      var v=p[1]||0, py=Y(v), bh=Math.max(0,padT+ih-py);
      var col=(o.bars.colorFor?o.bars.colorFor(p):o.bars.color)||'#4A5568';
      g+='<rect x="'+(X(p[0])-bw/2).toFixed(1)+'" y="'+py.toFixed(1)+'" width="'+bw.toFixed(1)+'" height="'+bh.toFixed(1)+'" rx="1.5" fill="'+col+'"/>';
    });
  }
  (o.series||[]).forEach(function(s){ if(!s.pts.length)return;
    var dp=s.pts.map(function(p,i){return (i?'L':'M')+X(p[0]).toFixed(1)+' '+Y(p[1]).toFixed(1);}).join(' ');
    g+='<path d="'+dp+'" fill="none" stroke="'+s.color+'" stroke-width="2"'+(s.dash?' stroke-dasharray="4 3"':'')+' stroke-linejoin="round" stroke-linecap="round"/>'; });
  return '<svg viewBox="0 0 '+w+' '+h+'" width="100%" preserveAspectRatio="xMidYMid meet" style="display:block">'+g+'</svg>';
}
function resolveBudget(client, monthKey){

    + '</div><span class="rangecount">'+n+' days · '+labelDate(rows[0].date)+' – '+labelDate(last.date)+'</span></div>';

  var tbl='<table class="bd"><thead><tr><th>Day</th><th class="r">Daily spend</th><th class="r">Cumulative</th><th class="r">Expected</th><th class="r">Conv.</th><th class="r">CPA</th>'
        + (hasRev?'<th class="r">Revenue</th><th class="r">ROAS</th>':'')
        + '<th class="r">Clicks</th><th class="r">Impr.</th></tr></thead><tbody>';
  rows.slice().reverse().forEach(function(r){ tbl+='<tr><td>'+labelDate(r.date)+'</td><td class="r">'+money(r.spend)+'</td><td class="r">'+money(r.cum)+'</td><td class="r">'+(r.expected?money(r.expected):'—')+'</td><td class="r">'+intf(r.conv)+'</td><td class="r">'+(r.cpa==null?'—':money(r.cpa))+'</td>'
    + (hasRev?('<td class="r">'+(r.rev>0?money(r.rev):'—')+'</td><td class="r">'+(r.roas==null?'—':xFmt(r.roas))+'</td>'):'')
    + '<td class="r">'+intf(r.clicks)+'</td><td class="r">'+intf(r.impr)+'</td></tr>'; });
  tbl+='</tbody></table>';

  return '<div class="detail">'+rangebar+'<div class="charts">'+charts+'</div>'
    + '<div class="ch-title" style="margin:16px 0 6px">Daily breakdown</div><div class="bd-wrap">'+tbl+'</div></div>';
}

/* ---- targeted updates (keep input focus while typing) ---- */
function updateComputed(client){
  var row=document.querySelector('[data-row="'+cssEsc(client)+'"]'); if(!row) return;
  var a=state.accounts.filter(function(x){return x.client===client;})[0]; if(!a) return;
  var d=derive(a), st=statusOf(d.pace), isLive=state.viewMonth===state.liveKey;
  var pc=row.querySelector('.cell-pace');
  if(pc){ pc.innerHTML=isLive?('<span class="pacepct t-'+st+'">'+pct(d.pace)+'</span>'+trendBadge(a,d)+meterHTML(d.pace,st)):'<span class="pace-na">—</span>'; }
  var vr=row.querySelector('.cell-var');
  if(vr){ vr.className='c-num cell-var '+(d.variance>0?'neg':'pos'); vr.textContent=isLive&&d.variance!=null?((d.variance>0?'+':'')+money(d.variance,true)):'—'; }
  updateTotals();
}
function updateTotals(){
  var vis=visibleAccounts(), t=totals(vis.list), isLive=state.viewMonth===state.liveKey;
  set('tot-budget',money(t.budget,true));
  set('tot-forecast',isLive?money(t.forecast,true):'—');
  set('tot-var',isLive&&t.variance!=null?((t.variance>0?'+':'')+money(t.variance,true)):'—');
  var tp=document.getElementById('tot-pace'); if(tp){ tp.innerHTML=isLive?('<span class="pacepct t-'+statusOf(t.pace)+'">'+pct(t.pace)+'</span>'+meterHTML(t.pace,statusOf(t.pace))):'<span class="pace-na">—</span>'; }
  var vv=document.getElementById('tot-var'); if(vv){ vv.className='c-num '+(t.variance>0?'neg':'pos'); }
}
function set(id,v){ var el=document.getElementById(id); if(el) el.textContent=v; }
function cssEsc(s){ return String(s).replace(/["\\]/g,'\\$&'); }

/* ============================================================
   EVENTS
   ============================================================ */
document.addEventListener('click', function(e){
  var el=e.target.closest('[data-act]'); if(!el) return;
  var act=el.getAttribute('data-act'), client=el.getAttribute('data-client');
  if(act==='prev'){ state.viewMonth=shiftKey(state.viewMonth,-1); render(); }
  else if(act==='next'){ state.viewMonth=shiftKey(state.viewMonth,1); render(); }
  else if(act==='today'){ state.viewMonth=state.liveKey; render(); }
  else if(act==='refresh'){ loadData(); }
  else if(act==='tab-pacing'){ state.view='pacing'; render(); }
  else if(act==='tab-settings'){ state.view='settings'; render(); }
  else if(act==='save-settings'){ saveSettings(); }
  else if(act==='toggle-all'){ state.showAll=!state.showAll; render(); }
  else if(act==='toggle-issues'){ state.filterIssues=!state.filterIssues; render(); }
  else if(act==='toggle-hidden'){ state.showHidden=!state.showHidden; render(); }
  else if(act==='rename'){ var ar=accountByClient(client); if(ar) renameClient(ar); }
  else if(act==='hide'){ var ah=accountByClient(client); if(ah) hideClient(ah,true); }
  else if(act==='unhide'){ var au=accountByClient(client); if(au) hideClient(au,false); }
  else if(act==='dismiss1'){ var a1=accountByClient(client); if(a1) dismissClient(a1,0); }
  else if(act==='dismiss7'){ var a7=accountByClient(client); if(a7) dismissClient(a7,7); }
  else if(act==='undismiss'){ var ad=accountByClient(client); if(ad) clearDismiss(ad); }
  else if(act==='range'){ state.detailDays=parseInt(el.getAttribute('data-days'),10)||30; render(); }
  else if(act==='sort'){ toggleSort(el.getAttribute('data-key')); render(); }
  else if(act==='group'){ groupSelected(); }
  else if(act==='bulk-lm'){ bulkLastMonth(); }
  else if(act==='ungroup'){ ungroupSelected(); }
  else if(act==='clearsel'){ state.selected={}; render(); }
  else if(act==='carryover'){ carryOverAll(); }
  else if(act==='copyprev'){ copyPrev(); }
  else if(act==='toggle'){ if(e.target.closest('[data-noexpand]')) return; state.open[client]=!state.open[client]; render(); }
  else if(act==='to-manual'){ setBudget(client,{mode:'manual',amount:Number(el.getAttribute('data-amt'))||0}); render(); }
  else if(act==='mode-manual'){ setBudget(client,{mode:'manual'}); render(); }
  else if(act==='mode-lm'){ setBudget(client,{mode:'lastMonth'}); render(); }
});
document.addEventListener('change', function(e){
  if(e.target.classList.contains('rowsel')){
    var cl=e.target.getAttribute('data-client');
    if(e.target.checked) state.selected[cl]=true; else delete state.selected[cl];
    render();
  } else if(e.target.classList.contains('selall')){
    var vis=visibleAccounts().list;
    if(e.target.checked) vis.forEach(function(a){ state.selected[a.client]=true; });
    else state.selected={};
    render();
  }
});
document.addEventListener('input', function(e){
  if(e.target.classList.contains('budget-input')){
    var el=e.target, client=el.getAttribute('data-client');
    var digits=el.value.replace(/[^0-9]/g,'');
    var val=digits===''?0:parseInt(digits,10);
    var digitsBefore=el.value.slice(0,el.selectionStart).replace(/[^0-9]/g,'').length;
    var formatted=digits===''?'':val.toLocaleString('en-US');
    el.value=formatted;
    var pos=0,seen=0; while(pos<formatted.length&&seen<digitsBefore){ if(formatted.charCodeAt(pos)>=48&&formatted.charCodeAt(pos)<=57) seen++; pos++; }
    try{ el.setSelectionRange(pos,pos); }catch(err){}
    setBudget(client,{mode:'manual',amount:val});
    updateComputed(client);
  } else if(e.target.id==='day-input'){
    var v=e.target.value.replace(/[^0-9]/g,'');
    state.elapsedOverride = v===''?null:parseInt(v,10);
    saveElapsed(state.elapsedOverride);
    visibleAccounts().list.forEach(function(a){ updateComputed(a.client); });
  }
});

function copyPrev(){
  var prev=shiftKey(state.viewMonth,-1);
  if(!state.budgets[prev]){ alert('No budgets saved for '+monthLabel(prev)+' to copy.'); return; }
  if(!confirm('Copy every budget from '+monthLabel(prev)+' into '+monthLabel(state.viewMonth)+'?')) return;
  var src=state.budgets[prev];
  Object.keys(src).forEach(function(client){ setBudget(client, {mode:src[client].mode, amount:src[client].amount}); });
  render();
}
